<div class="page-container">

  <div class="branding-header">
    <div class="logo-box">
      <img src="/logo.svg" alt="Retroid Logo">
      <span class="logo-text">Retroid</span>
    </div>
    <span class="version-text"></span>
  </div>

  <div class="login-card">
    <div class="row g-0 h-100">

      <div class="col-md-5 d-none d-md-flex illustration-panel">
        <img src="/arcade-bg.jpg" alt="Retro Illustration" class="pixel-art">
      </div>

      <div class="col-md-7 d-flex align-items-center justify-content-center p-4">
        <div class="form-container">
          <h1 class="pixel-title">WELCOME BACK</h1>
          <p class="pixel-hint">Enter your credentials to access the terminal.</p>

          <div class="form-group">
            <label>USERNAME</label>
            <div class="input-pixel-border">
              <input type="text" [(ngModel)]="loginData.username" placeholder="Enter username...">
            </div>
          </div>

          <div class="form-group">
            <label>PASSWORD</label>
            <div class="input-pixel-border">
              <input type="password" [(ngModel)]="loginData.password" placeholder="••••••••">
            </div>
          </div>

          <button (click)="onLogin()" class="pixel-btn-main">
            START_GAME
          </button>

          <p class="footer-link">
            New user? <a routerLink="/register">Create an account</a>
          </p>
        </div>
      </div>

    </div>
  </div>
</div>
