<div class="container-fluid vh-100 p-0 overflow-hidden">
  <div class="row g-0 h-100">

    <div class="col-md-6 d-none d-md-flex align-items-center justify-content-center bg-black position-relative">
      <img src="assets/arcade-bg.png" alt="Retro Arcade" class="img-fluid main-illustration">

      <div class="retro-grid"></div>
    </div>

    <div class="col-md-6 d-flex align-items-center justify-content-center bg-white">
      <div class="login-form-wrapper text-center px-5">

        <h1 class="pixel-font display-4 mb-3">Welcome back</h1>

        <p class="text-muted mb-5 px-lg-5">
          Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.
        </p>

        <div class="mb-4">
          <input type="text"
                 [(ngModel)]="loginData.username"
                 class="form-control custom-input rounded-pill mb-3"
                 placeholder="user name">

          <input type="password"
                 [(ngModel)]="loginData.password"
                 class="form-control custom-input rounded-pill mb-4"
                 placeholder="Password">
        </div>

        <button (click)="onLogin()" class="btn start-btn rounded-pill px-5 py-2">
          Start
        </button>

        <p class="mt-4 register-text">
          Don't have an account yet? <a href="/register" class="text-orange fw-bold">Register here</a>
        </p>
      </div>
    </div>

  </div>
</div>
