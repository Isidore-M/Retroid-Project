<div class="bidding-room-wrapper fade-in">
  <div class="room-header d-flex justify-content-between align-items-end">
    <div>
      <h2 class="pixel-font text-gold">THE ARTIFACT CHAMBER</h2>
      <p class="live-indicator"><span class="dot"></span> LIVE AUCTION DATA</p>
    </div>
    <div class="user-xp-display">
      YOUR BALANCE: <strong>{{ user.points }}</strong> <img src="/coin.svg" width="16">
    </div>
  </div>

  <div class="auction-grid">
   <div class="auction-card" *ngFor="let art of artifacts">
  <div class="timer-tag" [class.expired]="getRemainingTime(art.expiry_time) === 'AUCTION CLOSED'">
    <i class="bi bi-stopwatch me-1"></i>
    {{ getRemainingTime(art.expiry_time) }}
  </div>

  <div class="art-visual">
    <img [src]="'http://localhost/retroid/public/items/' + art.image_path">
  </div>

  <div class="art-details">
    <h3>{{ art.name }}</h3>

    <div class="price-box">
      <label>CURRENT BID</label>
      <div class="big-price">{{ art.current_bid || art.price }} <img src="/coin.svg" width="20"></div>
    </div>

    <div class="bid-action-group" *ngIf="getRemainingTime(art.expiry_time) !== 'AUCTION CLOSED'; else soldTemplate">
      <input type="number" #bidInput [placeholder]="(art.current_bid || art.price) + 10">
      <button (click)='placeBid(art, bidInput)'>PLACE BID</button>
    </div>

    <ng-template #soldTemplate>
      <div class="sold-banner">
        <h4 class="pixel-font">SOLD TO {{ art.highest_bidder || 'RESERVE NOT MET' }}</h4>
      </div>
    </ng-template>
  </div>
</div>
  </div>
</div>
