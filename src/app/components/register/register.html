<div class="page-container">

  <div class="branding-header">
    <div class="logo-box">
      <img src="/logo.svg" alt="Retroid Logo">
      <span class="logo-text">Retroid</span>
    </div>
    <span class="version-text">Retroid 2026</span>
  </div>

  <div class="register-card">
    <div class="row g-0 h-100">

      <div class="col-md-5 d-none d-md-flex art-panel order-md-2">
        <img src="/register-side.jpg" alt="Born to Game" class="pixel-art-img">
      </div>

      <div class="col-md-7 d-flex align-items-center justify-content-center p-4 order-md-1">
        <div class="form-content">
          <h1 class="pixel-title">NEW ACCOUNT</h1>
          <p class="pixel-hint">Select your character and enter credentials.</p>

          <div class="avatar-selection-box mb-4">
            <label class="section-label">CHOOSE AVATAR</label>
            <div class="avatar-grid">
              <div *ngFor="let id of avatars"
                   (click)="selectAvatar(id)"
                   [class.selected]="registerData.avatar_id === id"
                   class="avatar-pixel-item">
                <img [src]="'/avatars/' + id + '.jpeg'" alt="Avatar">
              </div>
            </div>
          </div>

          <div class="inputs-stack">
            <div class="input-field">
              <label>USERNAME</label>
              <div class="input-pixel-border" [class.input-error]="errors.username">
                <input type="text" [(ngModel)]="registerData.username" placeholder="Choose pseudo">
              </div>
              <p class="error-text" *ngIf="errors.username">{{ errors.username }}</p>
            </div>

            <div class="input-field">
              <label>PASSWORD</label>
              <div class="input-pixel-border" [class.input-error]="errors.password">
                <input type="password" [(ngModel)]="registerData.password" placeholder="••••••••">
              </div>
              <p class="error-text" *ngIf="errors.password">{{ errors.password }}</p>
            </div>

            <div class="input-field">
              <label>CONFIRM PASSWORD</label>
              <div class="input-pixel-border" [class.input-error]="errors.confirmPassword">
                <input type="password" [(ngModel)]="registerData.confirmPassword" placeholder="••••••••">
              </div>
              <p class="error-text" *ngIf="errors.confirmPassword">{{ errors.confirmPassword }}</p>
            </div>
          </div>

          <button (click)="onRegister()" class="btn-retro-action">
            CREATE_USER
          </button>

          <p class="login-link">
            Already have a ticket? <a routerLink="/login">Sign In</a>
          </p>
        </div>
      </div>

    </div>
  </div>
</div>
